ktor {
  deployment {
    port = 8000
  }
  application {
    modules = [ com.pbshop.kotlin.ktor.gradle.exposeddao.postgresql.ApplicationKt.module ]
  }
}

pbshop {
  apiPrefix = "/api/v1"
  appName = "pbshop-kotlin-ktor-gradle-exposeddao-postgresql"
  docsPath = "/docs"
  baselineTrack = "kotlin-ktor-gradle-exposeddao-postgresql"

  database {
    url = "jdbc:postgresql://127.0.0.1:5432/pbdb"
    url = ${?DB_URL}
    username = "project_bible"
    username = ${?DB_USERNAME}
    password = "project_bible"
    password = ${?DB_PASSWORD}
    driver = "org.postgresql.Driver"
    driver = ${?DB_DRIVER}
    engine = "postgresql"
    database = "pbdb"
    maxPoolSize = 5
    maxPoolSize = ${?DB_MAX_POOL_SIZE}
    minIdle = 1
    minIdle = ${?DB_MIN_IDLE}
  }
}
