spring.application.name=pbshop-springshop-maven
spring.profiles.default=local

server.port=${SERVER_PORT:8000}
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s

spring.jackson.time-zone=${PBSHOP_TIMEZONE:Asia/Seoul}
spring.jackson.default-property-inclusion=non_null

spring.servlet.multipart.max-file-size=${PBSHOP_UPLOAD_MAX_FILE_SIZE:20MB}
spring.servlet.multipart.max-request-size=${PBSHOP_UPLOAD_MAX_REQUEST_SIZE:25MB}

spring.datasource.url=${DB_URL:jdbc:mysql://127.0.0.1:3306/pbdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul}
spring.datasource.username=${DB_USERNAME:project_bible}
spring.datasource.password=${DB_PASSWORD:project_bible}
spring.datasource.driver-class-name=${DB_DRIVER:com.mysql.cj.jdbc.Driver}

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=${PBSHOP_TIMEZONE:Asia/Seoul}
spring.sql.init.mode=never

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-migration-naming=true

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
management.info.env.enabled=true

pbshop.api.base-path=${PBSHOP_API_BASE_PATH:/api/v1}
pbshop.frontend-url=${PBSHOP_FRONTEND_URL:http://localhost:3000}
pbshop.locale.default-locale=${PBSHOP_DEFAULT_LOCALE:ko}
pbshop.locale.supported=${PBSHOP_SUPPORTED_LOCALES:ko,en,ja}
pbshop.docs.swagger-path=${PBSHOP_SWAGGER_PATH:/docs/swagger}
pbshop.docs.openapi-path=${PBSHOP_OPENAPI_PATH:/docs/openapi}

springdoc.api-docs.path=${pbshop.docs.openapi-path}
springdoc.swagger-ui.path=${pbshop.docs.swagger-path}
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.paths-to-match=${pbshop.api.base-path}/**
springdoc.show-actuator=false
