name: PBShop JavaScript Express Prisma CI

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'BackEnd/JavaScript/expressshop_prismaorm/**'
      - '.github/workflows/javascript-express-prisma-ci.yml'
  push:
    branches: [main, develop]
    paths:
      - 'BackEnd/JavaScript/expressshop_prismaorm/**'
      - '.github/workflows/javascript-express-prisma-ci.yml'
  workflow_dispatch:
    inputs:
      target_ref:
        description: 'Branch or tag to run manual critical E2E on (ex: main, develop, release/v1)'
        required: true
        default: 'main'
        type: string

concurrency:
  group: javascript-express-prisma-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  WORKDIR: BackEnd/JavaScript/expressshop_prismaorm
  DATABASE_URL: postgresql://project_bible:project_bible@127.0.0.1:5432/pbdb?schema=public

jobs:
  critical-e2e:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: pbdb
          POSTGRES_USER: project_bible
          POSTGRES_PASSWORD: project_bible
        options: >-
          --health-cmd="pg_isready -U project_bible -d pbdb"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20
        ports:
          - 5432:5432
    defaults:
      run:
        working-directory: ${{ env.WORKDIR }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: BackEnd/JavaScript/expressshop_prismaorm/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Ensure PostgreSQL Client
        run: |
          if ! command -v psql >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y postgresql-client
          fi

      - name: Prepare Environment File
        run: |
          cat > .env <<EOF
          NODE_ENV=test
          PORT=8000
          APP_NAME=javascript-express-prisma
          API_PREFIX=/api/v1
          DATABASE_URL=${DATABASE_URL}
          DB_NAME=pbdb
          DB_USER=project_bible
          DB_PASSWORD=project_bible
          JWT_SECRET=ci-secret-key
          JWT_EXPIRES_IN=1h
          EOF

      - name: Bootstrap Shared PostgreSQL Schema
        env:
          PGPASSWORD: project_bible
        run: |
          psql -h 127.0.0.1 -U project_bible -d pbdb -f ../../../Database/postgresql/postgres_table.sql
          psql -h 127.0.0.1 -U project_bible -d pbdb -f ../../../Database/postgresql/sample_data.sql

      - name: Generate Prisma Client
        run: npm run prisma:generate

      - name: Run Critical E2E
        run: |
          mkdir -p test-results
          npm run test:e2e:critical | tee test-results/critical-e2e.log

      - name: Upload Critical E2E Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: javascript-express-prisma-critical-e2e
          path: BackEnd/JavaScript/expressshop_prismaorm/test-results/critical-e2e.log
          if-no-files-found: warn

  critical-e2e-manual:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: pbdb
          POSTGRES_USER: project_bible
          POSTGRES_PASSWORD: project_bible
        options: >-
          --health-cmd="pg_isready -U project_bible -d pbdb"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20
        ports:
          - 5432:5432
    defaults:
      run:
        working-directory: ${{ env.WORKDIR }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: BackEnd/JavaScript/expressshop_prismaorm/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Ensure PostgreSQL Client
        run: |
          if ! command -v psql >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y postgresql-client
          fi

      - name: Prepare Environment File
        run: |
          cat > .env <<EOF
          NODE_ENV=test
          PORT=8000
          APP_NAME=javascript-express-prisma
          API_PREFIX=/api/v1
          DATABASE_URL=${DATABASE_URL}
          DB_NAME=pbdb
          DB_USER=project_bible
          DB_PASSWORD=project_bible
          JWT_SECRET=ci-secret-key
          JWT_EXPIRES_IN=1h
          EOF

      - name: Bootstrap Shared PostgreSQL Schema
        env:
          PGPASSWORD: project_bible
        run: |
          psql -h 127.0.0.1 -U project_bible -d pbdb -f ../../../Database/postgresql/postgres_table.sql
          psql -h 127.0.0.1 -U project_bible -d pbdb -f ../../../Database/postgresql/sample_data.sql

      - name: Generate Prisma Client
        run: npm run prisma:generate

      - name: Run Critical E2E
        run: |
          mkdir -p test-results
          npm run test:e2e:critical | tee test-results/critical-e2e.log

      - name: Upload Critical E2E Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: javascript-express-prisma-critical-e2e-manual
          path: BackEnd/JavaScript/expressshop_prismaorm/test-results/critical-e2e.log
          if-no-files-found: warn

      - name: Write Manual Summary
        if: always()
        run: |
          echo "## JavaScript Critical E2E Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Trigger: \`workflow_dispatch\`" >> $GITHUB_STEP_SUMMARY
          echo "- Target ref: \`${{ inputs.target_ref }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Job result: \`${{ job.status }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Artifact: \`javascript-express-prisma-critical-e2e-manual\`" >> $GITHUB_STEP_SUMMARY
          echo "- Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
