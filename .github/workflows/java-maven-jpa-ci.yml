name: PBShop Java Maven JPA CI

on:
  pull_request:
    paths:
      - ".github/workflows/java-maven-jpa-ci.yml"
      - "BackEnd/Java/springshop_maven_jpa/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/java-maven-jpa-ci.yml"
      - "BackEnd/Java/springshop_maven_jpa/**"
  workflow_dispatch:
    inputs:
      target_ref:
        description: "Git ref to validate"
        required: false
        default: "main"
        type: string
      run_mode:
        description: "Manual CI suite to execute"
        required: true
        default: "release-gate"
        type: choice
        options:
          - release-gate
          - contract-e2e
          - migration-validation
          - migration-roundtrip
          - stability-check
          - security-regression
          - admin-boundary
          - rate-limit-regression
          - dependency-failure
          - perf-smoke
          - perf-extended
          - live-smoke

concurrency:
  group: java-maven-jpa-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  JAVA_VERSION: "21"
  WORKDIR: BackEnd/Java/springshop_maven_jpa

jobs:
  validate-dispatch-inputs:
    name: Validate Dispatch Inputs
    runs-on: ubuntu-latest
    steps:
      - name: Validate workflow_dispatch inputs
        shell: bash
        run: |
          if [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            exit 0
          fi

          target_ref="${{ github.event.inputs.target_ref }}"
          run_mode="${{ github.event.inputs.run_mode }}"

          case "$run_mode" in
            release-gate|contract-e2e|migration-validation|migration-roundtrip|stability-check|security-regression|admin-boundary|rate-limit-regression|dependency-failure|perf-smoke|perf-extended|live-smoke)
              ;;
            *)
              echo "Unsupported run_mode: $run_mode"
              exit 1
              ;;
          esac

          if [ -z "$target_ref" ]; then
            echo "target_ref must not be empty"
            exit 1
          fi

  quality:
    name: Quality
    runs-on: ubuntu-latest
    needs: validate-dispatch-inputs
    defaults:
      run:
        working-directory: ${{ env.WORKDIR }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.target_ref || github.ref }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Verify Maven wrapper
        run: chmod +x mvnw

      - name: Compile and run fast quality suite
        run: ./mvnw -B -Dspring.profiles.active=ci clean verify

  platform-e2e:
    name: Platform E2E
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name != 'workflow_dispatch'
    defaults:
      run:
        working-directory: ${{ env.WORKDIR }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Verify Maven wrapper
        run: chmod +x mvnw

      - name: Run platform regression suite
        run: >
          ./mvnw -B -Dspring.profiles.active=ci
          "-Dtest=PublicApiE2ETest,ContractPublicApiE2ETest,AdminAuthorizationBoundaryE2ETest,AdminPlatformE2ETest,OpsDashboardE2ETest,ObservabilityE2ETest,QueueAdminE2ETest,AuthSearchE2ETest"
          test

  swagger-export:
    name: Swagger Export
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name != 'workflow_dispatch'
    defaults:
      run:
        working-directory: ${{ env.WORKDIR }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Verify Maven wrapper
        run: chmod +x mvnw

      - name: Verify Swagger endpoints via integration test
        run: >
          ./mvnw -B -Dspring.profiles.active=ci
          "-Dtest=SwaggerDocsE2ETest"
          test

      - name: Start application for OpenAPI export
        shell: bash
        run: |
          ./mvnw -B -DskipTests -Dspring-boot.run.profiles=ci spring-boot:run > /tmp/java-maven-swagger.log 2>&1 &
          echo $! > /tmp/java-maven-swagger.pid

          ready=0
          for _ in $(seq 1 90); do
            if curl -fsS http://127.0.0.1:8000/docs/openapi -o openapi.json; then
              ready=1
              break
            fi
            sleep 2
          done

          if [ "$ready" -ne 1 ]; then
            echo "Spring Boot app did not become ready for Swagger export"
            cat /tmp/java-maven-swagger.log || true
            exit 1
          fi

          curl -fsS http://127.0.0.1:8000/docs/swagger -o /tmp/swagger-ui.html

      - name: Upload Swagger artifacts
        uses: actions/upload-artifact@v4
        with:
          name: java-maven-swagger
          path: |
            ${{ env.WORKDIR }}/openapi.json
            /tmp/swagger-ui.html
            ${{ env.WORKDIR }}/target/surefire-reports/*.xml
            ${{ env.WORKDIR }}/target/surefire-reports/*.txt
            /tmp/java-maven-swagger.log

      - name: Stop application
        if: always()
        shell: bash
        run: |
          if [ -f /tmp/java-maven-swagger.pid ]; then
            kill "$(cat /tmp/java-maven-swagger.pid)" || true
          fi

  perf-smoke:
    name: Performance Smoke
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name != 'workflow_dispatch'
    defaults:
      run:
        working-directory: ${{ env.WORKDIR }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Verify Maven wrapper
        run: chmod +x mvnw

      - name: Install k6
        uses: grafana/setup-k6-action@v1

      - name: Start mock perf server
        shell: bash
        run: |
          node test/performance/mock-perf-server.js > /tmp/java-maven-perf-server.log 2>&1 &
          echo $! > /tmp/java-maven-perf-server.pid
          sleep 5

      - name: Run performance smoke
        shell: bash
        run: |
          k6 run test/performance/smoke.perf.js --summary-export smoke-summary.json
          node test/performance/assert-summary.js smoke-summary.json

      - name: Upload performance artifacts
        uses: actions/upload-artifact@v4
        with:
          name: java-maven-perf-smoke
          path: |
            ${{ env.WORKDIR }}/smoke-summary.json
            /tmp/java-maven-perf-server.log

      - name: Stop mock perf server
        if: always()
        shell: bash
        run: |
          if [ -f /tmp/java-maven-perf-server.pid ]; then
            kill "$(cat /tmp/java-maven-perf-server.pid)" || true
          fi

  release-gate:
    name: Release Gate
    runs-on: ubuntu-latest
    needs: validate-dispatch-inputs
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_mode == 'release-gate'
    defaults:
      run:
        working-directory: ${{ env.WORKDIR }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.target_ref }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Verify Maven wrapper
        run: chmod +x mvnw

      - name: Run release gate suite
        run: >
          ./mvnw -B -Dspring.profiles.active=ci
          "-Dtest=FlywayMigrationTest,PublicApiE2ETest,ContractPublicApiE2ETest,AdminAuthorizationBoundaryE2ETest,AdminPlatformE2ETest,OpsDashboardE2ETest,ObservabilityE2ETest,QueueAdminE2ETest,SwaggerDocsE2ETest,AuthSearchE2ETest,OpsDashboardDependencyFailuresE2ETest,OpsDashboardResilienceE2ETest,OpsDashboardThresholdsE2ETest,RateLimitRegressionE2ETest,ResilienceAutoTuneE2ETest,SecurityRegressionE2ETest,AnalyzeStabilityScriptTest,LiveSmokeScriptTest,MigrationRoundtripScriptTest,ValidateMigrationsScriptTest"
          test

  contract-e2e-manual:
    name: Contract E2E Manual
    runs-on: ubuntu-latest
    needs: validate-dispatch-inputs
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_mode == 'contract-e2e'
    defaults:
      run:
        working-directory: ${{ env.WORKDIR }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.target_ref }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Verify Maven wrapper
        run: chmod +x mvnw

      - name: Run contract E2E suite
        run: >
          ./mvnw -B -Dspring.profiles.active=ci
          "-Dtest=ContractPublicApiE2ETest,SwaggerDocsE2ETest"
          test

  migration-validation-manual:
    name: Migration Validation Manual
    runs-on: ubuntu-latest
    needs: validate-dispatch-inputs
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_mode == 'migration-validation'
    defaults:
      run:
        working-directory: ${{ env.WORKDIR }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.target_ref }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Verify Maven wrapper
        run: chmod +x mvnw

      - name: Run migration validation suite
        run: >
          ./mvnw -B -Dspring.profiles.active=ci
          "-Dtest=FlywayMigrationTest,ValidateMigrationsScriptTest"
          test

  migration-roundtrip-manual:
    name: Migration Roundtrip Manual
    runs-on: ubuntu-latest
    needs: validate-dispatch-inputs
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_mode == 'migration-roundtrip'
    defaults:
      run:
        working-directory: ${{ env.WORKDIR }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.target_ref }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Verify Maven wrapper
        run: chmod +x mvnw

      - name: Run migration roundtrip suite
        run: >
          ./mvnw -B -Dspring.profiles.active=ci
          "-Dtest=MigrationRoundtripScriptTest"
          test

  stability-check-manual:
    name: Stability Check Manual
    runs-on: ubuntu-latest
    needs: validate-dispatch-inputs
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_mode == 'stability-check'
    defaults:
      run:
        working-directory: ${{ env.WORKDIR }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.target_ref }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Verify Maven wrapper
        run: chmod +x mvnw

      - name: Run stability analysis suite
        run: >
          ./mvnw -B -Dspring.profiles.active=ci
          "-Dtest=AnalyzeStabilityScriptTest,OpsDashboardResilienceE2ETest,OpsDashboardThresholdsE2ETest"
          test

  security-regression-manual:
    name: Security Regression Manual
    runs-on: ubuntu-latest
    needs: validate-dispatch-inputs
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_mode == 'security-regression'
    defaults:
      run:
        working-directory: ${{ env.WORKDIR }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.target_ref }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Verify Maven wrapper
        run: chmod +x mvnw

      - name: Run security regression suite
        run: >
          ./mvnw -B -Dspring.profiles.active=ci
          "-Dtest=SecurityRegressionE2ETest,AdminAuthorizationBoundaryE2ETest"
          test

  admin-boundary-manual:
    name: Admin Boundary Manual
    runs-on: ubuntu-latest
    needs: validate-dispatch-inputs
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_mode == 'admin-boundary'
    defaults:
      run:
        working-directory: ${{ env.WORKDIR }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.target_ref }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Verify Maven wrapper
        run: chmod +x mvnw

      - name: Run admin boundary suite
        run: >
          ./mvnw -B -Dspring.profiles.active=ci
          "-Dtest=AdminAuthorizationBoundaryE2ETest,AdminPlatformE2ETest,QueueAdminE2ETest"
          test

  rate-limit-regression-manual:
    name: Rate Limit Regression Manual
    runs-on: ubuntu-latest
    needs: validate-dispatch-inputs
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_mode == 'rate-limit-regression'
    defaults:
      run:
        working-directory: ${{ env.WORKDIR }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.target_ref }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Verify Maven wrapper
        run: chmod +x mvnw

      - name: Run rate limit regression suite
        run: >
          ./mvnw -B -Dspring.profiles.active=ci
          "-Dtest=RateLimitRegressionE2ETest,AuthSearchE2ETest"
          test

  dependency-failure-manual:
    name: Dependency Failure Manual
    runs-on: ubuntu-latest
    needs: validate-dispatch-inputs
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_mode == 'dependency-failure'
    defaults:
      run:
        working-directory: ${{ env.WORKDIR }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.target_ref }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Verify Maven wrapper
        run: chmod +x mvnw

      - name: Run dependency failure suite
        run: >
          ./mvnw -B -Dspring.profiles.active=ci
          "-Dtest=OpsDashboardDependencyFailuresE2ETest,OpsDashboardResilienceE2ETest,ResilienceAutoTuneE2ETest"
          test

  perf-smoke-manual:
    name: Performance Smoke Manual
    runs-on: ubuntu-latest
    needs: validate-dispatch-inputs
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_mode == 'perf-smoke'
    defaults:
      run:
        working-directory: ${{ env.WORKDIR }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.target_ref }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Install k6
        uses: grafana/setup-k6-action@v1

      - name: Start mock perf server
        shell: bash
        run: |
          node test/performance/mock-perf-server.js > /tmp/java-maven-perf-server.log 2>&1 &
          echo $! > /tmp/java-maven-perf-server.pid
          sleep 5

      - name: Run smoke performance suite
        shell: bash
        run: |
          k6 run test/performance/smoke.perf.js --summary-export smoke-summary.json
          node test/performance/assert-summary.js smoke-summary.json

      - name: Upload performance artifacts
        uses: actions/upload-artifact@v4
        with:
          name: java-maven-perf-smoke-manual
          path: |
            ${{ env.WORKDIR }}/smoke-summary.json
            /tmp/java-maven-perf-server.log

      - name: Stop mock perf server
        if: always()
        shell: bash
        run: |
          if [ -f /tmp/java-maven-perf-server.pid ]; then
            kill "$(cat /tmp/java-maven-perf-server.pid)" || true
          fi

  perf-extended-manual:
    name: Performance Extended Manual
    runs-on: ubuntu-latest
    needs: validate-dispatch-inputs
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_mode == 'perf-extended'
    defaults:
      run:
        working-directory: ${{ env.WORKDIR }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.target_ref }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Install k6
        uses: grafana/setup-k6-action@v1

      - name: Start mock perf server
        shell: bash
        run: |
          node test/performance/mock-perf-server.js > /tmp/java-maven-perf-server.log 2>&1 &
          echo $! > /tmp/java-maven-perf-server.pid
          sleep 5

      - name: Run extended performance suite
        shell: bash
        run: |
          k6 run test/performance/soak.perf.js --summary-export soak-summary.json
          node test/performance/assert-summary.js soak-summary.json
          k6 run test/performance/spike-search.perf.js --summary-export spike-search-summary.json
          node test/performance/assert-summary.js spike-search-summary.json
          k6 run test/performance/price-compare.perf.js --summary-export price-compare-summary.json
          node test/performance/assert-summary.js price-compare-summary.json
          k6 run test/performance/search-ranking.perf.js --summary-export search-ranking-summary.json
          node test/performance/assert-summary.js search-ranking-summary.json

      - name: Upload performance artifacts
        uses: actions/upload-artifact@v4
        with:
          name: java-maven-perf-extended
          path: |
            ${{ env.WORKDIR }}/*summary.json
            /tmp/java-maven-perf-server.log

      - name: Stop mock perf server
        if: always()
        shell: bash
        run: |
          if [ -f /tmp/java-maven-perf-server.pid ]; then
            kill "$(cat /tmp/java-maven-perf-server.pid)" || true
          fi

  live-smoke-manual:
    name: Live Smoke Manual
    runs-on: ubuntu-latest
    needs: validate-dispatch-inputs
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_mode == 'live-smoke'
    defaults:
      run:
        working-directory: ${{ env.WORKDIR }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.target_ref }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Prepare live smoke script
        shell: bash
        run: chmod +x test/scripts/live-smoke.sh

      - name: Run live smoke script
        shell: bash
        run: test/scripts/live-smoke.sh
