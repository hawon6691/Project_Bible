      - name: Bootstrap Shared PostgreSQL Schema
        env:
          PGPASSWORD: project_bible
        run: |
          psql -h 127.0.0.1 -U project_bible -d pbdb -f ../../../Database/postgresql/postgres_table.sql
          psql -h 127.0.0.1 -U project_bible -d pbdb -f ../../../Database/postgresql/sample_data.sql

