spring.application.name=pbshop-java-spring-gradle-jpa-postgresql
server.port=8000

spring.datasource.url=${DB_URL:jdbc:mysql://127.0.0.1:3306/pbdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul}
spring.datasource.username=${DB_USERNAME:project_bible}
spring.datasource.password=${DB_PASSWORD:project_bible}
spring.datasource.driver-class-name=${DB_DRIVER:com.mysql.cj.jdbc.Driver}

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Seoul

spring.jackson.time-zone=Asia/Seoul
spring.mvc.problemdetails.enabled=true

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always

pbshop.api.base-path=/api/v1
