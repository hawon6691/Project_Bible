        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none
          extensions: mbstring, sqlite3, pdo_sqlite, curl, openssl, intl, zip

      - name: Cache Composer Dependencies
        uses: actions/cache@v4
        with:
          path: BackEnd/PHP/php-laravel-composer-eloquent-postgresql/vendor
          key: ${{ runner.os }}-php-8.3-composer-${{ hashFiles('BackEnd/PHP/php-laravel-composer-eloquent-postgresql/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-8.3-composer-

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare Environment
        run: |
          if [ ! -f .env ]; then cp .env.example .env; fi
          php artisan key:generate --force
          mkdir -p test-results

      - name: Start Artisan Server
        run: |
          nohup php artisan serve --host=127.0.0.1 --port=8000 > test-results/rate-limit-server.log 2>&1 &
          for i in {1..20}; do
            if curl -fsS http://127.0.0.1:8000/api/v1/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat test-results/rate-limit-server.log
          exit 1

      - name: Run Repeated Smoke Requests
        run: |
          composer test:e2e:rate-limit
          success=0
          fail=0
          for i in {1..50}; do
            status=$(curl -o /dev/null -s -w "%{http_code}" http://127.0.0.1:8000/api/v1/health)
            if [ "$status" = "200" ]; then
              success=$((success + 1))
            else
              fail=$((fail + 1))
            fi
          done
          echo "success=${success}" > test-results/rate-limit-summary.txt
          echo "fail=${fail}" >> test-results/rate-limit-summary.txt

      - name: Upload Rate Limit Regression Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: php-rate-limit-regression-artifacts
          path: |
            BackEnd/PHP/php-laravel-composer-eloquent-postgresql/test-results/rate-limit-summary.txt
