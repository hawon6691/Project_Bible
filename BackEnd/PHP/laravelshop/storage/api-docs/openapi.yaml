openapi: 3.0.0
info:
  title: 'PBShop PHP API'
  description: 'Laravel implementation of the PBShop public API.'
  version: 1.0.0
servers:
  -
    url: 'http://127.0.0.1:8000'
    description: 'Local development server'
  -
    url: /api/v1
paths:
  /api/v1/health:
    get:
      tags:
        - System
      summary: '서비스 상태 확인'
      operationId: systemHealth
      responses:
        200:
          description: '정상 응답'
          content:
            application/json:
              schema:
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    properties:
                      service:
                        type: string
                        example: PBShop
                      language:
                        type: string
                        example: php
                      framework:
                        type: string
                        example: laravel
                      status:
                        type: string
                        example: ok
                    type: object
                type: object
components:
  securitySchemes:
    bearerAuth:
      type: http
      description: 'JWT Bearer token'
      scheme: bearer
      bearerFormat: JWT
tags:
  -
    name: System
    description: System
security:
  -
    bearerAuth: []
